version: "3.9"

services:
  # Persistent Qdrant instance
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # Policy Advisor API with persistent Qdrant
  policy-advisor:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CORPUS_DIR=/app/policy_corpus
      - METADATA_FILE=/app/policy_corpus/metadata.json
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./policy_corpus:/app/policy_corpus:ro
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_data: